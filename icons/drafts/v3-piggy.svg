<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFA9BD"/>
      <stop offset="1" stop-color="#FF6188"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <g fill="#FFFFFF">
    <!-- legs -->
    <rect x="350" y="660" width="70" height="110" rx="30"/>
    <rect x="620" y="660" width="70" height="110" rx="30"/>
    <!-- tail -->
    <path d="M310 470 q-50 -10 -40 -55 q5 -25 35 -20" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" fill="none"/>
    <!-- body + head (single silhouette) -->
    <path d="M310 560
             a230 195 0 1 1 460 0
             c0 35 18 50 55 60
             c30 8 30 45 -2 52
             c-22 5 -45 -2 -58 -22
             a230 195 0 0 1 -455 -90 Z"/>
    <!-- ear -->
    <path d="M560 358 q40 -55 95 -28 q-10 55 -65 70 Z"/>
  </g>

  <!-- coin slot -->
  <rect x="430" y="372" width="150" height="30" rx="15" fill="#E8456B" transform="rotate(-6 505 387)"/>
  <!-- eye -->
  <circle cx="640" cy="500" r="20" fill="#3A2233"/>
  <!-- nostrils -->
  <ellipse cx="800" cy="572" rx="10" ry="14" fill="#E8456B"/>
  <ellipse cx="800" cy="608" rx="10" ry="14" fill="#E8456B"/>
</svg>
